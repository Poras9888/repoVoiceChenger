name: voice_changer_sound_effects_recorder
description: Voice Changer & Sound Effects Recorder - playful, emoji-centric audio manipulation app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.4
  go_router: ^13.2.0
  get_it: ^7.6.7
  injectable: ^2.3.2
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20
  path_provider: ^2.1.2
  path: ^1.9.0
  record: ^5.1.0
  just_audio: ^0.9.37
  flutter_tts: ^4.0.2
  permission_handler: ^11.3.1
  local_auth: ^2.2.0
  share_plus: ^7.2.2
  url_launcher: ^6.2.6
  uuid: ^4.3.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.5
  google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
  drift_dev: ^2.16.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
